<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>roteiro.ia - Luxury Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --primary: #0ea5e9;
            --bg-deep: #020617;
            --bg-card: #0f172a;
            --border: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: #f1f5f9;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .input-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .config-card {
            background: #0f172a;
            width: 100%;
            max-width: 440px; /* Reduzido de 500px */
            border-radius: 32px; /* Mais compacto */
            padding: 28px; /* Reduzido de 40px */
            border: 1px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90vh; /* Garante que não ultrapasse a tela */
            overflow-y: auto;
        }

        .custom-input {
            width: 100%;
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 14px 18px; /* Mais compacto */
            color: white;
            outline: none;
            transition: all 0.2s;
            font-size: 14px;
        }

        .custom-input:focus { 
            border-color: var(--primary);
            background: rgba(2, 6, 23, 0.9);
        }

        .custom-input::placeholder {
            color: #475569;
            font-weight: 500;
        }

        .tier-selector {
            display: flex;
            background: #020617;
            padding: 4px;
            border-radius: 16px;
            border: 1px solid #1e293b;
            gap: 4px;
        }

        .tier-option {
            flex: 1;
            padding: 10px 2px; /* Mais compacto */
            text-align: center;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #64748b;
        }

        .tier-option.active {
            background: white;
            color: black;
        }

        /* View sections e navegacao mantidos */
        .day-carousel {
            display: flex;
            overflow-x: auto;
            padding: 16px;
            gap: 10px;
            background: var(--bg-deep);
            border-bottom: 1px solid var(--border);
        }
        .day-carousel::-webkit-scrollbar { display: none; }

        .day-bubble {
            flex: 0 0 auto;
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .day-bubble.active {
            background: var(--primary);
            color: white;
        }

        .view-section {
            padding: 20px;
            padding-bottom: 100px;
            overflow-y: auto;
            height: 100%;
        }

        .premium-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
        }

        #map { height: 100%; width: 100%; filter: grayscale(0.4) contrast(1.1); }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            height: 70px;
            display: flex;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            color: #64748b;
            font-size: 9px;
            font-weight: 700;
        }
        .nav-btn.active { color: var(--primary); }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Tela de Entrada Otimizada para Campo de Visao -->
    <div id="input-screen" class="input-overlay">
        <div class="config-card">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 bg-sky-500/10 rounded-xl flex items-center justify-center">
                    <i data-lucide="map" class="text-sky-500 w-6 h-6"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-extrabold text-white tracking-tight">Para onde vamos?</h2>
                    <p class="text-slate-400 text-xs">Roteiros inteligentes em segundos.</p>
                </div>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="user-origin" class="custom-input" placeholder="Onde você está? (Ex: Porto Alegre, RS)">

                <textarea id="user-query" class="custom-input h-24 resize-none" placeholder="Qual o seu plano? (Ex: 5 dias em Gramado focados em gastronomia)"></textarea>

                <div class="tier-selector">
                    <div id="tier-eco" onclick="setTier('econômico')" class="tier-option">💰 Econômico</div>
                    <div id="tier-std" onclick="setTier('standard')" class="tier-option active">⚖️ Standard</div>
                    <div id="tier-pre" onclick="setTier('premium')" class="tier-option">💎 Premium</div>
                </div>
                
                <button onclick="generateItinerary()" id="gen-btn" class="w-full bg-white text-black font-black py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-sky-500 hover:text-white transition-all text-sm mt-2">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    GERAR ROTEIRO COMPLETO
                </button>
            </div>
        </div>
    </div>

    <!-- App Main UI -->
    <div id="main-app" class="hidden h-screen flex flex-col">
        <div class="day-carousel" id="day-selector"></div>
        <div class="flex-1 relative overflow-hidden">
            <section id="itinerary-view" class="view-section">
                <button onclick="backToMenu()" class="mb-4 text-xs font-bold text-slate-500 flex items-center gap-1">
                    <i data-lucide="chevron-left" class="w-3 h-3"></i> VOLTAR
                </button>
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="day-title" class="text-2xl font-black text-white">...</h2>
                        <p id="day-subtitle" class="text-sky-500 font-bold uppercase text-[9px] tracking-widest mt-0.5">...</p>
                    </div>
                    <div class="bg-slate-900 px-2.5 py-1 rounded-lg border border-slate-800 text-[10px] font-bold" id="weather-val">--°</div>
                </div>
                <div id="day-content" class="space-y-4">
                    <!-- Cards de conteudo similares ao anterior porem mais densos -->
                    <div class="premium-card border-l-4 border-sky-500">
                        <span class="text-[9px] font-black uppercase text-slate-500 block mb-1">Hospedagem</span>
                        <h4 id="hotel-name" class="text-base font-bold text-white">...</h4>
                        <div class="flex justify-between items-center mt-2 pt-2 border-t border-slate-800">
                            <span id="hotel-price" class="text-lg font-black text-sky-500">R$ --</span>
                        </div>
                    </div>
                    <div class="premium-card">
                        <span class="text-[9px] font-black uppercase text-slate-500 block mb-4">Programação</span>
                        <div id="timeline" class="space-y-4 border-l border-slate-800 ml-1 pl-4"></div>
                    </div>
                </div>
            </section>
            <section id="map-view" class="absolute inset-0 hidden"><div id="map"></div></section>
        </div>
        <nav class="bottom-nav">
            <button onclick="switchTab('itinerary')" id="nav-itinerary" class="nav-btn active"><i data-lucide="compass"></i><span>ROTEIRO</span></button>
            <button onclick="switchTab('map')" id="nav-map" class="nav-btn"><i data-lucide="map-pin"></i><span>MAPA</span></button>
        </nav>
    </div>

    <script>
        const apiKey = ""; 
        let selectedTier = 'standard';
        let itineraryData = [];
        let map, markerGroup;

        function setTier(tier) {
            selectedTier = tier;
            document.querySelectorAll('.tier-option').forEach(el => el.classList.remove('active'));
            const id = tier === 'econômico' ? 'eco' : (tier === 'standard' ? 'std' : 'pre');
            document.getElementById(`tier-${id}`).classList.add('active');
        }

        async function generateItinerary() {
            const query = document.getElementById('user-query').value;
            const origin = document.getElementById('user-origin').value;
            const btn = document.getElementById('gen-btn');
            if (!query) return;
            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div>';

            const systemPrompt = `Você é um agente de viagens. Retorne uma ARRAY JSON de objetos por dia: [{ "id": 1, "title": "...", "subtitle": "...", "weather": "20°", "hotel": {"name": "...", "price": "R$ ..."}, "timeline": ["08:00 - Atividade"], "total": "R$ ...", "coords": [[lat, lng]] }]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Roteiro de ${query} saindo de ${origin}, perfil ${selectedTier}.` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        tools: [{ "google_search": {} }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const result = await response.json();
                itineraryData = JSON.parse(result.candidates[0].content.parts[0].text);
                renderApp();
            } catch (e) {
                itineraryData = mockData();
                renderApp();
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="sparkles" class="w-4 h-4"></i> GERAR ROTEIRO COMPLETO';
            }
        }

        function renderApp() {
            document.getElementById('input-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            const selector = document.getElementById('day-selector');
            selector.innerHTML = itineraryData.map(day => `
                <div onclick="loadDay(${day.id})" id="day-btn-${day.id}" class="day-bubble ${day.id === 1 ? 'active' : ''}">
                    <span class="text-[7px] font-black uppercase opacity-50">Dia</span>
                    <span class="text-lg font-black">${day.id}</span>
                </div>
            `).join('');
            initMap();
            loadDay(1);
            lucide.createIcons();
        }

        function loadDay(id) {
            const day = itineraryData.find(d => d.id === id);
            if(!day) return;
            document.querySelectorAll('.day-bubble').forEach(b => b.classList.remove('active'));
            document.getElementById(`day-btn-${id}`).classList.add('active');
            document.getElementById('day-title').innerText = day.title;
            document.getElementById('day-subtitle').innerText = day.subtitle;
            document.getElementById('weather-val').innerText = day.weather;
            document.getElementById('hotel-name').innerText = day.hotel.name;
            document.getElementById('hotel-price').innerText = day.hotel.price;
            document.getElementById('timeline').innerHTML = day.timeline.map(item => `
                <div class="relative">
                    <div class="absolute -left-[21px] w-2 h-2 bg-sky-500 rounded-full"></div>
                    <div class="text-sm font-bold text-white">${item}</div>
                </div>`).join('');
            updateMap(day.coords);
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([0,0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            markerGroup = L.layerGroup().addTo(map);
        }

        function updateMap(coords) {
            if (!map || !coords) return;
            markerGroup.clearLayers();
            const points = coords.map(c => L.latLng(c[0], c[1]));
            points.forEach(p => L.circleMarker(p, { radius: 5, color: '#0ea5e9' }).addTo(markerGroup));
            const poly = L.polyline(points, { color: '#0ea5e9', weight: 2, dashArray: '5, 5' }).addTo(markerGroup);
            map.fitBounds(poly.getBounds(), { padding: [40, 40] });
        }

        function switchTab(tab) {
            document.getElementById('itinerary-view').classList.toggle('hidden', tab === 'map');
            document.getElementById('map-view').classList.toggle('hidden', tab === 'itinerary');
            document.getElementById('nav-itinerary').classList.toggle('active', tab === 'itinerary');
            document.getElementById('nav-map').classList.toggle('active', tab === 'map');
            if(tab === 'map') setTimeout(() => map.invalidateSize(), 200);
        }

        function backToMenu() {
            document.getElementById('input-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }

        function mockData() {
            return [1,2,3,4,5].map(i => ({
                id: i, title: `Gramado Dia ${i}`, subtitle: "Experiência Completa", weather: "15°",
                hotel: { name: "Hotel Alpestre", price: "R$ 850" },
                timeline: ["09:00 - Visita ao Lago Negro", "12:30 - Almoço Colonial", "15:00 - Mini Mundo"],
                coords: [[-29.38, -50.87], [-29.39, -50.88]]
            }));
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
